# docker-compose.prod.yml — с лимитами
services:
  postgres:
    image: postgres:18-alpine
    container_name: postgres
    # ports не открываем — закрыт от внешнего мира
    env_file:
      - .env.prod
    volumes:
      - ./scripts/database/postgresql.conf:/etc/postgresql/postgresql.conf
      - ./scripts/database/init/:/docker-entrypoint-initdb.d/
      - pg-data:/var/lib/postgresql/data
    command: postgres -c config_file=/etc/postgresql/postgresql.conf
    deploy:
      resources:
        limits:
          memory: 512m
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - app-net
    restart: unless-stopped

volumes:
  pg-data:

networks:
  app-net:
    name: task-tracker-net
    driver: bridge