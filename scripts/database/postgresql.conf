# =========================
# NETWORK
# =========================
listen_addresses = '*'
port = 5432

# =========================
# LOCALE / ENCODING
# =========================
timezone = 'UTC'
client_encoding = 'UTF8'

# =========================
# MEMORY
#
# shared_buffers: 128MB → 64MB.
# Todo app — таблицы крошечные (tasks, users, tags).
# Весь рабочий датасет влезет в 64MB с запасом.
# 25% от нашего лимита 512MB = 128MB, но нам не нужно
# столько — данных мало, кешировать нечего.
#
# work_mem: 4MB → 2MB.
# CRUD запросы без сложных джоинов и сортировок.
# 10 соединений * 2MB = 20MB пиковое — достаточно.
#
# maintenance_work_mem: 64MB → 32MB.
# Миграций много не будет, таблицы маленькие.
# 32MB хватит для VACUUM и индексов.
#
# effective_cache_size: 256MB → 128MB.
# Подсказка планировщику. При нашем объёме данных
# и лимите контейнера 512MB реальный кеш ОС мал.
# =========================
shared_buffers       = 64MB
work_mem             = 2MB
maintenance_work_mem = 32MB
effective_cache_size = 128MB

# =========================
# CONNECTIONS
#
# Снижаем с 20 до 10.
# Клиенты: backend + scheduler + email-sender.
# Каждый сервис держит пул ~2-3 соединения.
# 10 — с запасом на пики.
# =========================
max_connections = 10

# =========================
# TIMEOUTS
#
# idle_in_transaction_session_timeout: 30s → 15s.
# Todo app не делает долгих транзакций.
# Зависшая транзакция — признак бага, убиваем быстро.
#
# statement_timeout: 0 → 5s.
# Любой запрос дольше 5s в todo app — это проблема.
# Простые CRUD не должны занимать больше миллисекунд.
# =========================
idle_in_transaction_session_timeout = '15s'
statement_timeout                   = '5s'

# =========================
# WAL
#
# wal_buffers: 8MB → 4MB.
# При max_connections=10 и лёгкой нагрузке хватит.
# Минимальное разумное значение.
#
# checkpoint_timeout: 5min → 10min.
# Todo app — некритичные данные, потеря последней
# задачи при краше допустима. Реже checkpoint = меньше I/O.
#
# max_wal_size: 512MB → 256MB.
# Объём данных минимальный. 256MB никогда не заполним.
#
# synchronous_commit: off.
# Оставляем — для todo app потеря записи при краше
# некритична. Скорость записи важнее.
# =========================
wal_buffers        = 4MB
checkpoint_timeout = 10min
max_wal_size       = 256MB
synchronous_commit = off

# =========================
# AUTOVACUUM
#
# autovacuum_vacuum_scale_factor: 0.2 → 0.3.
# Таблицы крошечные — запускать vacuum при изменении
# 30% строк. При 1000 задачах это 300 строк — разумно.
#
# autovacuum_analyze_scale_factor: 0.1 → 0.2.
# Статистику обновляем реже — планировщик и так
# справится с простыми запросами todo app.
# =========================
autovacuum_vacuum_scale_factor  = 0.3
autovacuum_analyze_scale_factor = 0.2

# =========================
# LOGGING
#
# log_min_duration_statement: 200ms → 100ms.
# Запросы todo app должны быть молниеносными.
# 100ms — уже сигнал что что-то не так.
#
# log_lock_waits и deadlock_timeout оставляем —
# полезно при отладке конкурентных запросов
# от трёх сервисов одновременно.
# =========================
log_min_duration_statement = 100
log_lock_waits             = on
deadlock_timeout           = 200ms
log_statement              = 'none'

# =========================
# EXTENSIONS
#
# pg_stat_statements оставляем для анализа.
# max снижаем с 1000 до 500 — todo app делает
# десятки уникальных запросов, не тысячи.
# =========================
shared_preload_libraries = 'pg_stat_statements'

pg_stat_statements.max   = 500
pg_stat_statements.track = all